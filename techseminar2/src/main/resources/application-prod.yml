spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  sql:
    init:
      mode: never
  ai:
    ollama:
      base-url: http://${OLLAMA_HOST}:11434
  jpa:
    hibernate:
      ddl-auto: update

pgvector:
  datasource:
    url: ${PGVECTOR_DATASOURCE_URL}
    username: ${PGVECTOR_DATASOURCE_USERNAME}
    password: ${PGVECTOR_DATASOURCE_PASSWORD}

core:
  datasource:
    url: ${CORE_DATASOURCE_URL}
    username: ${CORE_DATASOURCE_USERNAME}
    password: ${CORE_DATASOURCE_PASSWORD}