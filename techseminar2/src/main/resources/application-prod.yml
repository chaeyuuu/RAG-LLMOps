spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:3306/techseminar2_db
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
  ai:
    ollama:
      base-url: http://${OLLAMA_HOST}:11434
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false

pgvector:
  datasource:
    url: jdbc:postgresql://${PGVECTOR_HOST}:5432/techseminar2_db
    username: ${PGVECTOR_USERNAME}
    password: ${PGVECTOR_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always

core:
  datasource:
    url: jdbc:postgresql://${CORE_DB_HOST:core-db-svc.core.svc.cluster.local}:5432/core_db
    username: ${CORE_DB_USERNAME:core}
    password: ${CORE_DB_PASSWORD:core}