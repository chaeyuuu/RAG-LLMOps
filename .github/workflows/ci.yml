name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        cd techseminar2
        ./gradlew clean build -x test

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker image
      run: |
        cd techseminar2
        docker build -t ghcr.io/${{ github.repository_owner }}/techseminar2:${{ github.sha }} .
        docker tag ghcr.io/${{ github.repository_owner }}/techseminar2:${{ github.sha }} \
          ghcr.io/${{ github.repository_owner }}/techseminar2:latest
        docker push ghcr.io/${{ github.repository_owner }}/techseminar2:${{ github.sha }}
        docker push ghcr.io/${{ github.repository_owner }}/techseminar2:latest

    - name: Update image tag in infra repo
      run: |
        git clone https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/chaeyuuu/RAG-LLMOps-infra.git
        cd RAG-LLMOps-infra
        sed -i "s|image:.*|image: ghcr.io/chaeyuuu/techseminar2:${{ github.sha }}|" helm/values.yaml
        git config user.email "github-actions@github.com"
        git config user.name "GitHub Actions"
        git add helm/values.yaml
        git commit -m "ci: update image tag to ${{ github.sha }}"
        git push origin main

    - name: Delete old images
      uses: actions/delete-package-versions@v5
      with:
        package-name: techseminar2
        package-type: container
        min-versions-to-keep: 3
        token: ${{ secrets.GITHUB_TOKEN }}
