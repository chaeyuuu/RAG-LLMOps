name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build with Gradle
      run: |
        cd techseminar2
        ./gradlew clean build -x test

    - name: Build Docker image
      run: |
        cd techseminar2
        docker build -t ghcr.io/${{ github.repository_owner }}/techseminar2:${{ github.sha }} .
        docker tag ghcr.io/${{ github.repository_owner }}/techseminar2:${{ github.sha }} \
          ghcr.io/${{ github.repository_owner }}/techseminar2:latest

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push to GHCR
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/techseminar2:${{ github.sha }}
        docker push ghcr.io/${{ github.repository_owner }}/techseminar2:latest
